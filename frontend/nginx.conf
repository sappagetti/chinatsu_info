# 컨테이너 안에서: 정적 React + /api 만 백엔드 컨테이너로 넘김. Compose 서비스 이름 backend 가 DNS로 잡힌다.
server {
  listen 80;
  # `Server: nginx/x.y.z` 응답 헤더에서 버전 정보를 숨긴다.
  server_tokens off;
  # 북마크릿 ingest payload(점수+곡메타)가 1MB를 넘을 수 있어 상향.
  client_max_body_size 20m;
  root /usr/share/nginx/html;
  index index.html;

  # --- 보안 헤더 ---
  # `always` 를 붙이면 4xx/5xx 응답에도 같이 내려간다.
  # 주의: location 블록에서 `add_header` 를 한 번이라도 선언하면 server 블록의
  # add_header 는 해당 location 에서 상속되지 않으므로, 아래 헤더를 그대로 유지하려면
  # 위치별 add_header 를 추가할 때 함께 재선언해야 한다.
  #
  # HSTS: 상위 리버스 프록시가 TLS 를 종료하면서 헤더를 덮어쓸 수 있으므로,
  # 최종 HSTS 정책은 가장 앞단에서 관리하는 것을 권장. 여기서는 기본값으로만 세팅.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
  # CSP: 기본은 same-origin, 외부는 다음만 허용:
  #   - Cloudflare Turnstile (script/frame/connect)
  #   - Google Fonts (style/font)
  # music-ex.json 은 백엔드가 /api/v1/music-ex.json 으로 미러링하므로 connect-src 에 GitHub 호스트를
  # 넣을 필요가 없다. 업스트림 URL 은 backend 의 MUSIC_EX_SOURCE_URL 환경변수에서 관리한다.
  # 외부 자원을 추가할 때는 img-src / connect-src / script-src 등 해당 지시어를 함께 업데이트.
  # 검증을 먼저 하려면 아래 줄을 `Content-Security-Policy-Report-Only` 로 바꿔 배포 후
  # 브라우저 콘솔의 CSP violation 로그를 확인한다.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

  # SPA: 없는 경로는 index.html 로 (클라이언트 라우팅)
  location / {
    try_files $uri $uri/ /index.html;
  }
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
